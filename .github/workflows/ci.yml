name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validate data and build
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate vocabulary data
        run: python3 scripts/validate_words.py

      - name: Verify word-state behavior
        run: |
          swiftc -parse-as-library \
            Shared/Models/GREWord.swift \
            Shared/Models/WidgetDisplayState.swift \
            Shared/Support/SharedConstants.swift \
            Shared/Services/RandomWordPicker.swift \
            Shared/Stores/WordStateStore.swift \
            scripts/verify_state_logic.swift \
            -framework Security \
            -o "$RUNNER_TEMP/verify-gre-glance-state"
          "$RUNNER_TEMP/verify-gre-glance-state"

      - name: Build app and embedded Widget
        run: |
          xcodebuild \
            -project GREGlance.xcodeproj \
            -scheme GREGlance \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build
