name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validate data and build
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate vocabulary data
        run: python3 scripts/validate_words.py

      - name: Run unit tests
        run: |
          xcodebuild \
            -project IELTSGlance.xcodeproj \
            -scheme IELTSGlance \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM= \
            test

      - name: Build app and embedded Widget
        run: |
          xcodebuild \
            -project IELTSGlance.xcodeproj \
            -scheme IELTSGlance \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build
