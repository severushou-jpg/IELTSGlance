name: Bug report
description: Report a reproducible problem in the app or Widget.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve GRE Glance. Please avoid including personal or signing information.
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: macOS 26.2
    validations:
      required: true
  - type: input
    id: xcode-version
    attributes:
      label: Xcode version
      placeholder: Xcode 26.2
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Main app
        - Desktop Widget
        - Build or signing
        - Vocabulary data or scripts
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest repeatable sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove Apple IDs, team identifiers, paths, and other personal information first.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I confirmed the problem with the latest main branch when possible.
          required: true
